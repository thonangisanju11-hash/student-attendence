<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* LOGIN BOX */
.login-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #3f51b5, #1a237e);
}

.login-card {
  background: white;
  width: 320px;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  text-align: center;
}

.login-card h2 {
  margin-bottom: 20px;
  color: #1a237e;
}

.login-card input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.login-card button {
  width: 100%;
  padding: 10px;
  background: #3f51b5;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

.login-card button:hover {
  background: #303f9f;
}

    
body { margin:0; font-family: Arial; background:#f0f8ff; }
nav {
  background:#1a237e;
  padding:10px;
  display:flex;
  gap:15px;
}
nav button {
  background:#3f51b5;
  border:none;
  color:white;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}
nav button:hover { background:#303f9f; }

.page { display:none; padding:20px; }
h2 { color:#1a237e; }

input, select {
  padding:7px;
  margin:5px 0;
  width:100%;
}

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button.primary {
  background:#4caf50;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

button.danger {
  background:#f44336;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV BAR -->
<nav id="navbar" style="display:none;">
  <button onclick="showPage('attendance')">Attendance</button>
  <button onclick="showPage('members')">Members</button>
  <button onclick="showPage('history')">History</button>
  <button onclick="showPage('graphics')">Graphics</button>
  <button onclick="logout()">Logout</button>
</nav>

<!-- LOGIN PAGE -->
<div id="login" class="page" style="display:block;">
  <h2>Admin Login</h2>
  <div class="card">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
    <p id="loginError" style="color:red;"></p>
  </div>
</div>

<!-- ATTENDANCE PAGE -->
<div id="attendance" class="page">
  <h2>Class Attendance</h2>
  <input type="date" id="attDate">
  <div id="attendanceList"></div>
  <button class="primary" onclick="submitAttendance()">Submit Attendance</button>
</div>

<!-- MEMBERS PAGE -->
<div id="members" class="page">
  <h2>Class Members (Admin Only)</h2>
  <div class="card">
    <input id="mName" placeholder="Name">
    <input id="mRoll" placeholder="Roll">
    <button class="primary" onclick="addMember()">Add Member</button>
  </div>
  <div id="memberList"></div>
</div>

<!-- HISTORY PAGE -->
<div id="history" class="page">
  <h2>Attendance History</h2>
  <div id="historyList"></div>
</div>

<!-- GRAPHICS PAGE -->
<div id="graphics" class="page">
  <h2>Attendance Graphics</h2>
  <canvas id="chart"></canvas>
</div>

<script>
/* ---------- AUTH ---------- */
const ADMIN = { user:"admin", pass:"admin123" };

function login(){
  const u = username.value;
  const p = password.value;
  if(u===ADMIN.user && p===ADMIN.pass){
    localStorage.setItem("loggedIn","true");
    navbar.style.display="flex";
    showPage("attendance");
  } else {
    loginError.innerText="Invalid login";
  }
}

function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

if(localStorage.getItem("loggedIn")){
  navbar.style.display="flex";
  showPage("attendance");
}

/* ---------- NAV ---------- */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(id).style.display="block";
  if(id==="members") renderMembers();
  if(id==="attendance") renderAttendance();
  if(id==="history") loadHistory();
  if(id==="graphics") drawChart();
}

/* ---------- DATA ---------- */
let members = JSON.parse(localStorage.getItem("members")) || [
  {name:"Sanju", roll:"1"},
  {name:"Manju", roll:"2"}
];

let attendanceHistory = JSON.parse(localStorage.getItem("history")) || [];

/* ---------- MEMBERS ---------- */
function addMember(){
  const name = mName.value.trim();
  const roll = mRoll.value.trim();
  if(!name || !roll) return alert("Fill all fields");
  if(members.some(m=>m.roll===roll)) return alert("Roll exists");

  members.push({name,roll});
  localStorage.setItem("members",JSON.stringify(members));
  mName.value=mRoll.value="";
  renderMembers();
}

function renderMembers(){
  memberList.innerHTML="";
  members.forEach(m=>{
    memberList.innerHTML+=`
      <div class="card">${m.roll} - ${m.name}</div>`;
  });
}

/* ---------- ATTENDANCE ---------- */
function renderAttendance(){
  attendanceList.innerHTML="";
  members.forEach((m,i)=>{
    attendanceList.innerHTML+=`
    <div class="card">
      ${m.roll} - ${m.name}
      <select id="a${i}">
        <option value="">Select</option>
        <option>Present</option>
        <option>Absent</option>
      </select>
    </div>`;
  });
}

function submitAttendance(){
  const date = attDate.value;
  if(!date) return alert("Select date");
  const record=[];
  members.forEach((m,i)=>{
    const status=document.getElementById(`a${i}`).value;
    if(!status) return alert("Mark all attendance");
    record.push({...m,status});
  });
  attendanceHistory.push({date,record});
  localStorage.setItem("history",JSON.stringify(attendanceHistory));
  alert("Attendance saved");
}

/* ---------- HISTORY ---------- */
function loadHistory(){
  historyList.innerHTML="";
  attendanceHistory.forEach(h=>{
    let html=`<div class="card"><b>${h.date}</b><ul>`;
    h.record.forEach(r=>{
      html+=`<li>${r.roll}-${r.name}: ${r.status}</li>`;
    });
    html+="</ul></div>";
    historyList.innerHTML+=html;
  });
}

/* ---------- GRAPHICS ---------- */
let chart;
function drawChart(){
  if(chart) chart.destroy();
  const counts={};
  members.forEach(m=>counts[m.name]={P:0,A:0});
  attendanceHistory.forEach(h=>{
    h.record.forEach(r=>{
      if(r.status==="Present") counts[r.name].P++;
      else counts[r.name].A++;
    });
  });

  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:members.map(m=>m.name),
      datasets:[
        {label:"Present",data:members.map(m=>counts[m.name].P),backgroundColor:"green"},
        {label:"Absent",data:members.map(m=>counts[m.name].A),backgroundColor:"red"}
      ]
    }
  });
}
</script>
</body>
</html>
